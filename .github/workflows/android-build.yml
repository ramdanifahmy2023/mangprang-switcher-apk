name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mangprang-switcher-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Commit debug APK into repo
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p releases/latest
          cp app/build/outputs/apk/debug/*.apk releases/latest/mangprang-switcher-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/latest/mangprang-switcher-debug.apk
          git commit -m "Update debug APK artifact [skip ci]" || exit 0
          git push
