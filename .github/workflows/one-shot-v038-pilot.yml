name: One-shot encrypted v0.3.8 pilot APK

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: one-shot-v038-pilot
  cancel-in-progress: true

jobs:
  build-encrypted-pilot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Check source contracts
        run: |
          python3 tools/check_security_contract.py
          python3 tools/check_login_contract.py

      - name: Lint, test, and build pilot APK
        run: |
          set +e
          gradle lintDebug testDebugUnitTest assembleDebug --no-daemon --stacktrace > "$RUNNER_TEMP/build.log" 2>&1
          status=$?
          set -e
          cat "$RUNNER_TEMP/build.log"
          printf '%s\n' "$status" > "$RUNNER_TEMP/build-exit-code"

      - name: Verify and encrypt artifact or diagnostics
        run: |
          set -eu
          build_status="$(cat "$RUNNER_TEMP/build-exit-code")"
          mkdir -p "$RUNNER_TEMP/payload"
          {
            echo 'version=0.3.8'
            echo 'versionCode=15'
            echo "commit=${GITHUB_SHA}"
            echo "buildStatus=${build_status}"
          } > "$RUNNER_TEMP/payload/build-info.txt"

          if [ "$build_status" = "0" ]; then
            apk_path="$(find app/build/outputs/apk/debug -maxdepth 1 -type f -name '*.apk' -print | head -n 1)"
            test -n "$apk_path"
            test "$(find app/build/outputs/apk/debug -maxdepth 1 -type f -name '*.apk' -print | wc -l | tr -d ' ')" = "1"
            apksigner_path="$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name apksigner -print | sort -V | tail -n 1)"
            test -x "$apksigner_path"
            "$apksigner_path" verify --verbose --print-certs "$apk_path" > "$RUNNER_TEMP/payload/apksigner.txt"
            cp "$apk_path" "$RUNNER_TEMP/payload/mangprang-switcher-v0.3.8-internal-pilot-debug.apk"
            (cd "$RUNNER_TEMP/payload" && sha256sum mangprang-switcher-v0.3.8-internal-pilot-debug.apk > SHA256SUMS)
            echo 'channel=internal-pilot-debug-signed' >> "$RUNNER_TEMP/payload/build-info.txt"
          else
            cp "$RUNNER_TEMP/build.log" "$RUNNER_TEMP/payload/build.log"
            echo 'channel=encrypted-build-diagnostics' >> "$RUNNER_TEMP/payload/build-info.txt"
          fi

          (cd "$RUNNER_TEMP/payload" && zip -9 "$RUNNER_TEMP/mangprang-v038-pilot.zip" ./*)
          openssl cms -encrypt -binary -aes-256-cbc \
            -in "$RUNNER_TEMP/mangprang-v038-pilot.zip" \
            -outform DER \
            -out "$RUNNER_TEMP/mangprang-v038-pilot.p7m" \
            tools/one-shot-v038-recipient-cert.pem
          sha256sum "$RUNNER_TEMP/mangprang-v038-pilot.p7m" > "$RUNNER_TEMP/ENCRYPTED_SHA256SUMS"

      - name: Publish encrypted transport branch
        run: |
          set -eu
          git config user.name 'Safira Fathia Build Bot'
          git config user.email 'safira@fahmyid.local'
          git checkout --orphan safira-build-v038-encrypted
          git rm -rf .
          git clean -fdx
          mkdir -p encrypted-artifact
          cp "$RUNNER_TEMP/mangprang-v038-pilot.p7m" encrypted-artifact/
          cp "$RUNNER_TEMP/ENCRYPTED_SHA256SUMS" encrypted-artifact/
          printf '%s\n' "$GITHUB_SHA" > encrypted-artifact/source-commit.txt
          git add encrypted-artifact
          git commit -m 'Encrypted one-shot v0.3.8 pilot artifact [skip ci]'
          git push --force origin HEAD:refs/heads/safira-build-v038-encrypted

      - name: Enforce successful build
        run: test "$(cat "$RUNNER_TEMP/build-exit-code")" = "0"
